name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ---------------------------------------------------------------------------
    #  Formatting — clang-format check
    # ---------------------------------------------------------------------------
    formatting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install clang-format-20
              run: |
                  wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
                    | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
                  echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] \
                    http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" \
                    | sudo tee /etc/apt/sources.list.d/llvm-20.list
                  sudo apt-get update
                  sudo apt-get install -y clang-format-20

            - name: Check formatting
              run: |
                  find src/ tests/ -name '*.c' -o -name '*.h' \
                    | xargs clang-format-20 --dry-run --Werror

    # ---------------------------------------------------------------------------
    #  JavaScript linting — ESLint (example carts)
    # ---------------------------------------------------------------------------
    js-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Lint examples
              run: |
                  failed=0
                  for dir in examples/*/; do
                    if [ -f "$dir/package.json" ] && grep -q '"lint"' "$dir/package.json"; then
                      echo "::group::$dir"
                      (cd "$dir" && npm ci --ignore-scripts && npm run lint) || failed=1
                      echo "::endgroup::"
                    fi
                  done
                  exit $failed

    # ---------------------------------------------------------------------------
    #  Static analysis — clang-tidy
    # ---------------------------------------------------------------------------
    clang-tidy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/debug/_deps
                  key: linux-tidy-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-tidy-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: clang-tidy

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DBUILD_SHARED_LIBS=OFF
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

            - name: Run clang-tidy
              run: |
                  find src/ -name '*.c' ! -name 'main.c' \
                    | xargs clang-tidy -p build/debug --warnings-as-errors='*'

    # ---------------------------------------------------------------------------
    #  Windows — MSVC (native)
    # ---------------------------------------------------------------------------
    windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/debug/_deps
                  key: win-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: win-deps-

            - name: Configure
              run: cmake --preset debug

            - name: Build
              run: cmake --build build/debug --config Debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300 -C Debug

    # ---------------------------------------------------------------------------
    #  Linux — GCC
    # ---------------------------------------------------------------------------
    linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/debug/_deps
                  key: linux-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build
              run: cmake --build build/debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  Linux — GCC (Release)
    # ---------------------------------------------------------------------------
    linux-release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/release/_deps
                  key: linux-release-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-release-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps

            - name: Configure
              run: cmake --preset release -G Ninja

            - name: Build
              run: cmake --build build/release

            - name: Test
              working-directory: build/release
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  Linux — GCC + ASan / UBSan
    # ---------------------------------------------------------------------------
    linux-sanitizers:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/asan/_deps
                  key: linux-asan-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-asan-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps

            - name: Configure
              run: cmake --preset asan -G Ninja

            - name: Build
              run: cmake --build build/asan

            - name: Test
              working-directory: build/asan
              run: ctest --output-on-failure --timeout 300
              env:
                  LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  Linux — GCC + Coverage (lcov)
    # ---------------------------------------------------------------------------
    coverage:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/coverage/_deps
                  key: linux-cov-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-cov-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: lcov

            - name: Configure
              run: >
                  cmake -B build/coverage -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DDTR_ENABLE_COVERAGE=ON
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build
              run: cmake --build build/coverage

            - name: Test
              working-directory: build/coverage
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

            - name: Collect coverage
              run: |
                  lcov --capture --directory build/coverage \
                       --include '${{ github.workspace }}/src/*' \
                       --output-file build/coverage.info \
                       --ignore-errors mismatch
                  genhtml build/coverage.info \
                       --output-directory build/coverage-report

            - name: Check coverage threshold
              run: |
                  COVERAGE=$(lcov --summary build/coverage.info 2>&1 \
                    | grep -Po 'lines\.*:\s*\K[0-9]+(\.[0-9]+)?')
                  echo "Line coverage: ${COVERAGE}%"
                  if [ "$(echo "$COVERAGE < 55" | bc)" -eq 1 ]; then
                    echo "::error::Coverage ${COVERAGE}% is below the 55% threshold"
                    exit 1
                  fi

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: build/coverage-report/

    # ---------------------------------------------------------------------------
    #  macOS — AppleClang
    # ---------------------------------------------------------------------------
    macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/debug/_deps
                  key: macos-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: macos-deps-

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build
              run: cmake --build build/debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  macOS — AppleClang + ASan / UBSan
    # ---------------------------------------------------------------------------
    macos-sanitizers:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/asan/_deps
                  key: macos-asan-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: macos-asan-deps-

            - name: Configure
              run: cmake --preset asan -G Ninja

            - name: Build
              run: cmake --build build/asan

            - name: Test
              working-directory: build/asan
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  Linux — Clang
    # ---------------------------------------------------------------------------
    linux-clang:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/debug/_deps
                  key: linux-clang-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-clang-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: clang

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DCMAKE_C_COMPILER=clang
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build
              run: cmake --build build/debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

    # ---------------------------------------------------------------------------
    #  WASM — Emscripten build check
    # ---------------------------------------------------------------------------
    wasm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Ninja
              run: sudo apt-get update && sudo apt-get install -y ninja-build

            - name: Cache emsdk
              id: cache-emsdk
              uses: actions/cache@v5
              with:
                  path: emsdk
                  key: emsdk-${{ runner.os }}

            - name: Setup Emscripten
              if: steps.cache-emsdk.outputs.cache-hit != 'true'
              run: |
                  rm -rf emsdk
                  git clone https://github.com/emscripten-core/emsdk.git --depth 1
                  cd emsdk
                  ./emsdk install latest
                  ./emsdk activate latest

            - name: Activate emsdk
              run: |
                  cd emsdk && ./emsdk activate latest
                  echo "${{ github.workspace }}/emsdk" >> $GITHUB_PATH
                  echo "${{ github.workspace }}/emsdk/upstream/emscripten" >> $GITHUB_PATH
                  echo "EMSDK=${{ github.workspace }}/emsdk" >> $GITHUB_ENV

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/wasm/_deps
                  key: wasm-ci-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: wasm-ci-deps-

            - name: Configure
              run: >
                  cmake --preset wasm
                  -DDTR_WASM_CART_DIR=${{ github.workspace }}/examples/hello_world

            - name: Build
              run: cmake --build build/wasm

            - name: Configure tests
              run: >
                  cmake -B build/wasm-test -G Ninja
                  -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/emsdk/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake
                  -DCMAKE_BUILD_TYPE=Release
                  -DCMAKE_CROSSCOMPILING_EMULATOR=node
                  -DDTR_BUILD_TESTS=ON
                  -DDTR_BUILD_EXAMPLES=OFF
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build tests
              run: cmake --build build/wasm-test

            - name: Test
              working-directory: build/wasm-test
              run: ctest --output-on-failure --timeout 300

    # ---------------------------------------------------------------------------
    #  WASM browser smoke test — load in headless Chromium via Playwright
    # ---------------------------------------------------------------------------
    wasm-browser:
        runs-on: ubuntu-latest
        needs: wasm
        steps:
            - uses: actions/checkout@v6

            - name: Install Ninja
              run: sudo apt-get update && sudo apt-get install -y ninja-build

            - name: Cache emsdk
              id: cache-emsdk
              uses: actions/cache@v5
              with:
                  path: emsdk
                  key: emsdk-${{ runner.os }}

            - name: Setup Emscripten
              if: steps.cache-emsdk.outputs.cache-hit != 'true'
              run: |
                  rm -rf emsdk
                  git clone https://github.com/emscripten-core/emsdk.git --depth 1
                  cd emsdk
                  ./emsdk install latest
                  ./emsdk activate latest

            - name: Activate emsdk
              run: |
                  cd emsdk && ./emsdk activate latest
                  echo "${{ github.workspace }}/emsdk" >> $GITHUB_PATH
                  echo "${{ github.workspace }}/emsdk/upstream/emscripten" >> $GITHUB_PATH
                  echo "EMSDK=${{ github.workspace }}/emsdk" >> $GITHUB_ENV

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: build/wasm/_deps
                  key: wasm-ci-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: wasm-ci-deps-

            - name: Configure WASM
              run: >
                  cmake --preset wasm
                  -DDTR_WASM_CART_DIR=${{ github.workspace }}/examples/hello_world

            - name: Build WASM
              run: cmake --build build/wasm

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install Playwright
              working-directory: tests/wasm-browser
              run: |
                  npm ci
                  npx playwright install --with-deps chromium

            - name: Run browser smoke test
              working-directory: tests/wasm-browser
              run: npx playwright test
