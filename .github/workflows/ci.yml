name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ---------------------------------------------------------------------------
    #  Windows — MSVC (native)
    # ---------------------------------------------------------------------------
    windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Configure
              run: cmake --preset debug

            - name: Build
              run: cmake --build build/debug --config Debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure -C Debug

    # ---------------------------------------------------------------------------
    #  Linux — GCC
    # ---------------------------------------------------------------------------
    linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ninja-build xvfb \
                    libx11-dev libxext-dev libxcursor-dev libxi-dev \
                    libxfixes-dev libxrandr-dev libxrender-dev libxss-dev \
                    libxtst-dev libxxf86vm-dev \
                    libwayland-dev libxkbcommon-dev \
                    libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
                    libegl1-mesa-dev libdbus-1-dev libudev-dev \
                    libasound2-dev libpulse-dev libpipewire-0.3-dev \
                    libdecor-0-dev

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug

            - name: Build
              run: cmake --build build/debug

            - name: Test
              working-directory: build/debug
              env:
                  SDL_VIDEODRIVER: dummy
                  SDL_AUDIODRIVER: dummy
              run: xvfb-run ctest --output-on-failure --timeout 300

    # ---------------------------------------------------------------------------
    #  macOS — AppleClang
    # ---------------------------------------------------------------------------
    macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug

            - name: Build
              run: cmake --build build/debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300
