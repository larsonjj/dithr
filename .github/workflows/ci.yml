name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ---------------------------------------------------------------------------
    #  Formatting — clang-format check
    # ---------------------------------------------------------------------------
    formatting:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install clang-format-22
              run: |
                  wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
                    | sudo gpg --dearmor -o /usr/share/keyrings/llvm.gpg
                  echo "deb [signed-by=/usr/share/keyrings/llvm.gpg] \
                    http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
                    | sudo tee /etc/apt/sources.list.d/llvm-22.list
                  sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
                  sudo apt-get update
                  sudo apt-get install -y clang-format-22

            - name: Check formatting
              run: |
                  find src/ tests/ -name '*.c' -o -name '*.h' \
                    | xargs clang-format-22 --dry-run --Werror

    # ---------------------------------------------------------------------------
    #  JavaScript linting — ESLint (example carts)
    # ---------------------------------------------------------------------------
    js-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Lint examples
              run: |
                  failed=0
                  for dir in examples/*/; do
                    if [ -f "$dir/package.json" ] && grep -q '"lint"' "$dir/package.json"; then
                      echo "::group::$dir"
                      (cd "$dir" && npm ci --ignore-scripts && npm run lint && npm run typecheck) || failed=1
                      echo "::endgroup::"
                    fi
                  done
                  exit $failed

    # ---------------------------------------------------------------------------
    #  Static analysis — clang-tidy
    # ---------------------------------------------------------------------------
    clang-tidy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      build/debug/_deps
                      ~/.cmake/packages
                  key: linux-tidy-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-tidy-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: clang-tidy

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: linux-tidy-ccache
                  max-size: 500M

            - name: Configure
              run: >
                  cmake -B build/debug -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DBUILD_SHARED_LIBS=OFF
                  -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache

            - name: Run clang-tidy
              run: |
                  find src/ -name '*.c' ! -name 'main.c' \
                    | xargs clang-tidy -p build/debug --warnings-as-errors='*'

    # ---------------------------------------------------------------------------
    #  Windows — MSVC (native)
    # ---------------------------------------------------------------------------
    windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      build/debug/_deps
                      ~\AppData\Local\CMake\packages
                  key: win-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: win-deps-

            - name: Configure
              run: cmake --preset debug

            - name: Build
              run: cmake --build build/debug --config Debug

            - name: Test
              working-directory: build/debug
              run: ctest --output-on-failure --timeout 300 -C Debug

    # ---------------------------------------------------------------------------
    #  Linux — GCC / Clang build matrix
    # ---------------------------------------------------------------------------
    linux:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: GCC Debug
                      cmake-args: >-
                          -B build/debug -G Ninja
                          -DCMAKE_BUILD_TYPE=Debug
                          -DBUILD_SHARED_LIBS=OFF
                      build-dir: build/debug
                      cache-key: linux-deps
                    - name: GCC Release
                      cmake-args: --preset release -G Ninja
                      build-dir: build/release
                      cache-key: linux-release-deps
                    - name: GCC ASan/UBSan
                      cmake-args: --preset asan -G Ninja
                      build-dir: build/asan
                      cache-key: linux-asan-deps
                    - name: Clang Debug
                      cmake-args: >-
                          -B build/debug -G Ninja
                          -DCMAKE_BUILD_TYPE=Debug
                          -DCMAKE_C_COMPILER=clang
                          -DBUILD_SHARED_LIBS=OFF
                      build-dir: build/debug
                      cache-key: linux-clang-deps
                      extra-packages: clang
        name: Linux — ${{ matrix.name }}
        env:
            SDL_AUDIO_DRIVER: dummy
            SDL_VIDEO_DRIVER: dummy
            SDL_AUDIODRIVER: dummy
            SDL_VIDEODRIVER: dummy
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      ${{ matrix.build-dir }}/_deps
                      ~/.cmake/packages
                  key: ${{ matrix.cache-key }}-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: ${{ matrix.cache-key }}-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: ${{ matrix.extra-packages || '' }}

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: ${{ matrix.cache-key }}-ccache
                  max-size: 500M

            - name: Configure
              run: cmake ${{ matrix.cmake-args }} -DCMAKE_C_COMPILER_LAUNCHER=ccache

            - name: Build
              run: cmake --build ${{ matrix.build-dir }}

            - name: Test
              working-directory: ${{ matrix.build-dir }}
              run: ctest --output-on-failure --timeout 300
              env:
                  LSAN_OPTIONS: ${{ matrix.name == 'GCC ASan/UBSan' && format('suppressions={0}/tests/lsan_suppressions.txt', github.workspace) || '' }}

    # ---------------------------------------------------------------------------
    #  Linux — GCC + Coverage (lcov)
    # ---------------------------------------------------------------------------
    coverage:
        runs-on: ubuntu-latest
        env:
            SDL_AUDIO_DRIVER: dummy
            SDL_VIDEO_DRIVER: dummy
            SDL_AUDIODRIVER: dummy
            SDL_VIDEODRIVER: dummy
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      build/coverage/_deps
                      ~/.cmake/packages
                  key: linux-cov-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: linux-cov-deps-

            - name: Install dependencies
              uses: ./.github/actions/install-linux-deps
              with:
                  extra-packages: lcov

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: linux-cov-ccache
                  max-size: 500M

            - name: Configure
              run: >
                  cmake -B build/coverage -G Ninja
                  -DCMAKE_BUILD_TYPE=Debug
                  -DDTR_ENABLE_COVERAGE=ON
                  -DBUILD_SHARED_LIBS=OFF
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache

            - name: Build
              run: cmake --build build/coverage

            - name: Test
              working-directory: build/coverage
              run: ctest --output-on-failure --timeout 300

            - name: Collect coverage
              run: |
                  lcov --capture --directory build/coverage \
                       --include '${{ github.workspace }}/src/*' \
                       --output-file build/coverage.info \
                       --ignore-errors mismatch
                  genhtml build/coverage.info \
                       --output-directory build/coverage-report

            - name: Check coverage threshold
              run: |
                  COVERAGE=$(lcov --summary build/coverage.info 2>&1 \
                    | grep -Po 'lines\.*:\s*\K[0-9]+(\.[0-9]+)?')
                  echo "Line coverage: ${COVERAGE}%"
                  if [ "$(echo "$COVERAGE < 65" | bc)" -eq 1 ]; then
                    echo "::error::Coverage ${COVERAGE}% is below the 65% threshold"
                    exit 1
                  fi

            - name: Upload coverage report
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report
                  path: build/coverage-report/

    # ---------------------------------------------------------------------------
    #  macOS — AppleClang build matrix
    # ---------------------------------------------------------------------------
    macos:
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Debug
                      cmake-args: >-
                          -B build/debug -G Ninja
                          -DCMAKE_BUILD_TYPE=Debug
                          -DBUILD_SHARED_LIBS=OFF
                      build-dir: build/debug
                      cache-key: macos-deps
                    - name: ASan/UBSan
                      cmake-args: --preset asan -G Ninja
                      build-dir: build/asan
                      cache-key: macos-asan-deps
        name: macOS — ${{ matrix.name }}
        env:
            SDL_AUDIO_DRIVER: dummy
            SDL_VIDEO_DRIVER: dummy
            SDL_AUDIODRIVER: dummy
            SDL_VIDEODRIVER: dummy
        steps:
            - uses: actions/checkout@v6

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      ${{ matrix.build-dir }}/_deps
                      ~/.cmake/packages
                  key: ${{ matrix.cache-key }}-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: ${{ matrix.cache-key }}-

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: ${{ matrix.cache-key }}-ccache
                  max-size: 500M

            - name: Configure
              run: cmake ${{ matrix.cmake-args }} -DCMAKE_C_COMPILER_LAUNCHER=ccache

            - name: Build
              run: cmake --build ${{ matrix.build-dir }}

            - name: Test
              working-directory: ${{ matrix.build-dir }}
              run: ctest --output-on-failure --timeout 300

    # ---------------------------------------------------------------------------
    #  WASM — Emscripten build check
    # ---------------------------------------------------------------------------
    wasm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Ninja
              run: sudo apt-get update && sudo apt-get install -y ninja-build

            - name: Cache emsdk
              id: cache-emsdk
              uses: actions/cache@v5
              with:
                  path: emsdk
                  key: emsdk-5.0.6-${{ runner.os }}

            - name: Setup Emscripten
              if: steps.cache-emsdk.outputs.cache-hit != 'true'
              run: |
                  rm -rf emsdk
                  git clone https://github.com/emscripten-core/emsdk.git --depth 1
                  cd emsdk
                  ./emsdk install 5.0.6
                  ./emsdk activate 5.0.6

            - name: Activate emsdk
              run: |
                  cd emsdk && ./emsdk activate 5.0.6
                  echo "${{ github.workspace }}/emsdk" >> $GITHUB_PATH
                  echo "${{ github.workspace }}/emsdk/upstream/emscripten" >> $GITHUB_PATH
                  echo "EMSDK=${{ github.workspace }}/emsdk" >> $GITHUB_ENV

            - name: Cache build
              uses: actions/cache@v5
              with:
                  path: |
                      build/wasm/_deps
                      ~/.cmake/packages
                  key: wasm-ci-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: wasm-ci-deps-

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: wasm-ci-ccache
                  max-size: 500M

            - name: Configure
              run: >
                  cmake --preset wasm
                  -DDTR_WASM_CART_DIR=${{ github.workspace }}/examples/hello_world
                  -DCMAKE_C_COMPILER_LAUNCHER=ccache

            - name: Build
              run: cmake --build build/wasm

            - name: Upload WASM build
              uses: actions/upload-artifact@v7
              with:
                  name: wasm-build
                  path: |
                      build/wasm/dithr.*
                      build/wasm/index.html
                  retention-days: 1

            - name: Configure tests
              run: >
                  cmake -B build/wasm-test -G Ninja
                  -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/emsdk/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake
                  -DCMAKE_BUILD_TYPE=Release
                  -DCMAKE_CROSSCOMPILING_EMULATOR=node
                  -DDTR_BUILD_TESTS=ON
                  -DDTR_BUILD_EXAMPLES=OFF
                  -DBUILD_SHARED_LIBS=OFF

            - name: Build tests
              run: cmake --build build/wasm-test

            - name: Test
              working-directory: build/wasm-test
              run: ctest --output-on-failure --timeout 300

    # ---------------------------------------------------------------------------
    #  WASM browser smoke test — load in headless Chromium via Playwright
    # ---------------------------------------------------------------------------
    wasm-browser:
        runs-on: ubuntu-latest
        needs: wasm
        steps:
            - uses: actions/checkout@v6

            - name: Download WASM build
              uses: actions/download-artifact@v8
              with:
                  name: wasm-build
                  path: build/wasm

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Install Playwright
              working-directory: tests/wasm-browser
              run: |
                  npm ci
                  npx playwright install --with-deps chromium

            - name: Run browser smoke test
              working-directory: tests/wasm-browser
              run: npx playwright test

    # ---------------------------------------------------------------------------
    #  npm packages — structure validation & audit
    # ---------------------------------------------------------------------------
    npm-packages:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22

            - name: Install package dependencies
              run: npm install --ignore-scripts --omit=optional --prefix packages/sdk

            - name: Pack all packages
              run: |
                  mkdir -p build/npm-tarballs
                  for pkg in sdk create wasm win32-x64 linux-x64 darwin-arm64; do
                    npm pack "./packages/$pkg" --pack-destination build/npm-tarballs
                  done

            - name: Verify package contents
              run: |
                  failed=0
                  for tarball in build/npm-tarballs/*.tgz; do
                    echo "::group::$(basename "$tarball")"
                    tar tzf "$tarball"
                    echo "::endgroup::"
                  done

                  # SDK must include bin/, lib/, templates/, types/, configs/
                  for dir in bin lib templates types configs; do
                    if ! tar tzf build/npm-tarballs/dithrkit-sdk-*.tgz | grep -q "package/$dir/"; then
                      echo "::error::SDK package missing $dir/"
                      failed=1
                    fi
                  done

                  # create package must include index.js
                  if ! tar tzf build/npm-tarballs/dithrkit-create-*.tgz | grep -q "package/index.js"; then
                    echo "::error::create package missing index.js"
                    failed=1
                  fi

                  exit $failed

            - name: Audit dependencies
              run: >
                  npm audit --audit-level=high --omit=optional --prefix packages/sdk
              continue-on-error: true
