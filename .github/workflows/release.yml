name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write
    id-token: write

jobs:
    build-windows:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      build/release/_deps
                      ~/.cmake/packages
                  key: release-win-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: release-win-deps-

            - name: Configure
              run: cmake --preset release

            - name: Build
              run: cmake --build build/release --config Release

            - name: Test
              run: ctest --output-on-failure -C Release
              working-directory: build/release
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

            - name: Package
              run: |
                  mkdir dist
                  Copy-Item build/release/Release/dithr.exe dist/
                  Copy-Item LICENSE dist/
                  Copy-Item README.md dist/
                  Compress-Archive -Path dist/* -DestinationPath dithr-windows-x64.zip

            - name: Stage npm package
              run: |
                  New-Item -ItemType Directory -Force packages/win32-x64/bin | Out-Null
                  Copy-Item build/release/Release/dithr.exe packages/win32-x64/bin/

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: dithr-windows-x64
                  path: dithr-windows-x64.zip

            - name: Upload npm package
              uses: actions/upload-artifact@v7
              with:
                  name: npm-win32-x64
                  path: packages/win32-x64/

    build-linux:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install dependencies
              run: |
                  sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
                  sudo apt-get update
                  sudo apt-get install -y ninja-build \
                    libx11-dev libxext-dev libxcursor-dev libxi-dev \
                    libxfixes-dev libxrandr-dev libxrender-dev libxss-dev \
                    libxtst-dev libxxf86vm-dev \
                    libwayland-dev libxkbcommon-dev \
                    libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
                    libegl1-mesa-dev libdbus-1-dev libudev-dev \
                    libasound2-dev libpulse-dev libpipewire-0.3-dev \
                    libdecor-0-dev

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      build/release/_deps
                      ~/.cmake/packages
                  key: release-linux-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: release-linux-deps-

            - name: Configure
              run: cmake --preset release

            - name: Build
              run: cmake --build build/release --config Release

            - name: Test
              run: ctest --output-on-failure -C Release
              working-directory: build/release
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

            - name: Package
              run: |
                  mkdir dist
                  cp build/release/dithr dist/
                  cp LICENSE README.md dist/
                  tar czf dithr-linux-x64.tar.gz -C dist .

            - name: Stage npm package
              run: |
                  mkdir -p packages/linux-x64/bin
                  cp build/release/dithr packages/linux-x64/bin/

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: dithr-linux-x64
                  path: dithr-linux-x64.tar.gz

            - name: Upload npm package
              uses: actions/upload-artifact@v7
              with:
                  name: npm-linux-x64
                  path: packages/linux-x64/

    build-macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      build/release/_deps
                      ~/.cmake/packages
                  key: release-macos-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: release-macos-deps-

            - name: Configure
              run: |
                  attempts=0
                  until [ "$attempts" -ge 3 ]; do
                    attempts=$((attempts + 1))
                    echo "Configure attempt ${attempts}/3"
                    if cmake --preset release; then
                      exit 0
                    fi

                    echo "::warning::Configure failed (attempt ${attempts}/3). Clearing SDL3_image FetchContent state and retrying."
                    rm -rf build/release/_deps/sdl3_image-subbuild \
                           build/release/_deps/sdl3_image-src \
                           build/release/_deps/sdl3_image-build
                  done

                  echo "::error::cmake configure failed after 3 attempts"
                  exit 1

            - name: Build
              run: cmake --build build/release --config Release

            - name: Test
              run: ctest --output-on-failure -C Release
              working-directory: build/release
              env:
                  SDL_AUDIO_DRIVER: dummy
                  SDL_VIDEO_DRIVER: dummy
                  SDL_AUDIODRIVER: dummy
                  SDL_VIDEODRIVER: dummy

            - name: Package
              run: |
                  mkdir dist
                  cp build/release/dithr dist/
                  cp LICENSE README.md dist/
                  tar czf dithr-macos-arm64.tar.gz -C dist .

            - name: Stage npm package
              run: |
                  mkdir -p packages/darwin-arm64/bin
                  cp build/release/dithr packages/darwin-arm64/bin/

            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: dithr-macos-arm64
                  path: dithr-macos-arm64.tar.gz

            - name: Upload npm package
              uses: actions/upload-artifact@v7
              with:
                  name: npm-darwin-arm64
                  path: packages/darwin-arm64/

    build-wasm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Emscripten
              uses: mymindstorm/setup-emsdk@v14
              with:
                  actions-cache-folder: emsdk-cache

            - name: Cache dependencies
              uses: actions/cache@v5
              with:
                  path: |
                      build/wasm/_deps
                      ~/.cmake/packages
                  key: release-wasm-deps-${{ hashFiles('CMakeLists.txt') }}
                  restore-keys: release-wasm-deps-

            - name: Configure
              run: cmake --preset wasm -DDTR_WASM_CART_DIR=examples/hello_world

            - name: Build
              run: cmake --build build/wasm

            - name: Stage npm package
              run: |
                  mkdir -p packages/wasm/bin
                  cp build/wasm/dithr.js packages/wasm/bin/
                  cp build/wasm/dithr.wasm packages/wasm/bin/

            - name: Upload npm package
              uses: actions/upload-artifact@v7
              with:
                  name: npm-wasm
                  path: packages/wasm/

    release:
        needs: [build-windows, build-linux, build-macos, build-wasm]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/download-artifact@v8
              with:
                  pattern: dithr-*
                  merge-multiple: true

            - name: Create release
              uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
                  files: |
                      dithr-windows-x64.zip
                      dithr-linux-x64.tar.gz
                      dithr-macos-arm64.tar.gz

    publish-npm:
        needs: [build-windows, build-linux, build-macos, build-wasm]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: Verify npm auth
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  echo "npm $(npm --version)"
                  if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
                    echo "::error::NPM_TOKEN secret is not set."
                    exit 1
                  fi
                  npm whoami --registry https://registry.npmjs.org

            - name: Download platform packages
              uses: actions/download-artifact@v8
              with:
                  pattern: npm-*

            - name: Stage platform binaries
              run: |
                  cp -r npm-win32-x64/* packages/win32-x64/
                  cp -r npm-linux-x64/* packages/linux-x64/
                  cp -r npm-darwin-arm64/* packages/darwin-arm64/
                  cp -r npm-wasm/* packages/wasm/

            - name: Set package versions from tag
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  for pkg in packages/*/package.json; do
                    tmp=$(mktemp)
                    jq --arg v "$VERSION" '.version = $v' "$pkg" > "$tmp" && mv "$tmp" "$pkg"
                  done
                  # Update optionalDependencies versions in SDK
                  tmp=$(mktemp)
                  jq --arg v "$VERSION" '
                    .optionalDependencies |= with_entries(.value = $v) |
                    .version = $v
                  ' packages/sdk/package.json > "$tmp" && mv "$tmp" packages/sdk/package.json
                  # Update SDK dependency version in create package
                  tmp=$(mktemp)
                  jq --arg v "$VERSION" '
                    .dependencies["@dithrkit/sdk"] = $v |
                    .version = $v
                  ' packages/create/package.json > "$tmp" && mv "$tmp" packages/create/package.json

            - name: Determine npm publish tag
              id: npm-tag
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  if echo "$VERSION" | grep -qE '[-]'; then
                    echo "tag=--tag next" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=" >> "$GITHUB_OUTPUT"
                  fi

            - name: Publish platform packages
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: |
                  for pkg in win32-x64 linux-x64 darwin-arm64 wasm; do
                    if ! npm publish "./packages/$pkg" --provenance --access public ${{ steps.npm-tag.outputs.tag }}; then
                      echo "::error::Failed publishing @dithrkit/$pkg."
                      exit 1
                    fi
                  done

            - name: Publish SDK
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish ./packages/sdk --provenance --access public ${{ steps.npm-tag.outputs.tag }}

            - name: Publish create package
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: npm publish ./packages/create --provenance --access public ${{ steps.npm-tag.outputs.tag }}
