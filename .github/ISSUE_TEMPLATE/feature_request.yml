name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: Describe the feature you'd like.
      validations:
          required: true

    - type: textarea
      id: motivation
      attributes:
          label: Motivation
          description: Why is this feature useful? What problem does it solve?

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Any workarounds or alternative approaches you've thought of.
