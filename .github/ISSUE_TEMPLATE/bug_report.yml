name: Bug Report
description: Report a bug in dithr
labels: [bug]
body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear description of the bug.
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to reproduce
          description: Minimal steps to trigger the issue.
          placeholder: |
              1. Run `dithr examples/hello_world/cart.json`
              2. ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected behaviour

    - type: textarea
      id: actual
      attributes:
          label: Actual behaviour

    - type: dropdown
      id: platform
      attributes:
          label: Platform
          options:
              - Windows
              - macOS
              - Linux
              - WASM / Browser
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: dithr version or commit
          placeholder: e.g. v0.1.0 or abc1234
