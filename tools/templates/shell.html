<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>dithr</title>
<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #111; overflow: hidden;
}
canvas#canvas {
  display: block; margin: auto;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#splash {
  position: fixed; inset: 0; display: flex; align-items: center;
  justify-content: center; flex-direction: column;
  background: #111; color: #aaa; font: 1rem monospace;
  z-index: 10; cursor: pointer;
}
#splash.hidden { display: none; }
#progress-bar {
  width: 200px; height: 4px; background: #333; margin-top: 12px;
  border-radius: 2px; overflow: hidden;
}
#progress-fill {
  width: 0%; height: 100%; background: #6cf; transition: width 0.2s;
}
#touch-start {
  display: none; margin-top: 16px; color: #ccc; font-size: 0.9rem;
}
</style>
</head>
<body>
<div id="splash">
  <div>loading…</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="touch-start">tap to start</div>
</div>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

<script>
var Module = {
  canvas: document.getElementById("canvas"),
  setStatus: function(text) {
    // Emscripten calls this with "Downloading data... (x/y)" or ""
    var m = text.match(/(\d+)\/(\d+)/);
    var fill = document.getElementById("progress-fill");
    if (m) {
      var pct = (parseInt(m[1]) / parseInt(m[2]) * 100).toFixed(0);
      if (fill) fill.style.width = pct + "%";
    } else if (text === "") {
      // Loading complete
      if (fill) fill.style.width = "100%";
      var splash = document.getElementById("splash");
      if ("ontouchstart" in window) {
        document.getElementById("touch-start").style.display = "block";
        splash.addEventListener("click", function() {
          splash.classList.add("hidden");
        });
        splash.addEventListener("touchend", function() {
          splash.classList.add("hidden");
        });
      } else {
        splash.classList.add("hidden");
      }
    }
  }
};
</script>

</body>
</html>
